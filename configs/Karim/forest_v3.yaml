# ---meta---
expname: forest_v3

load_phase1a_from: null
load_phase1b_from: null
load_phase2a_from: null
load_phase2b_from: null
load_phase2c_from: null

# ----- args generation -----
prompt: A serene forest scene with a small stream, dappled sunlight filtering through the leaves, realism style.

num_dreams: 2
pcd_upsampling_factor: 4


phase2: # pairs of sphere inpainting + deformation
  outliers_removal: 
    apply_on_fg: True
    apply_on_ldi: False
    options:
      nb_neighbors: 20
      std_ratio: 1.8
      verbose: True

phase5v2:
  render_settings:
    use_gpu_series: True   
    use_gpu_parallel: True 
  nfs_dataset:
    bg_color: [0, 0, 0, 1]
    fov_deg: 60.0
    nb_points: 1000
    nb_samples_per_point: 5
    ranges:
      min_x: 0.0
      min_y: -0.2
      max_y: 0.2
      min_z: -0.1
      max_z: 0.3